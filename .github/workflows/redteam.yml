# Red Team Workflow — Adversarial evaluation (CE)
# Runs weekly or manually to stress-test the AI system

name: Red Team

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0" # Weekly — Sundays at 3 AM UTC

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  redteam:
    name: AI Red Team Probes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "azure-ai-evaluation[redteam]"

      - name: Azure Login (OIDC)
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve target URL
        id: target
        run: |
          echo "url=${{ secrets.APP_SERVICE_ENDPOINT }}" >> "$GITHUB_OUTPUT"
          echo "Target: ${{ secrets.APP_SERVICE_ENDPOINT }}"

      - name: Wait for target to be ready
        run: |
          TARGET="${{ steps.target.outputs.url }}"
          HEALTH_URL="${TARGET%/chat}/health"
          echo "Waiting for ${HEALTH_URL} ..."
          for i in $(seq 1 30); do
            if curl -sf "${HEALTH_URL}" > /dev/null 2>&1; then
              echo "Target is ready!"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Target health check timed out — proceeding anyway"

      - name: Run Red Team Probes
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_AI_FOUNDRY_PROJECT: ${{ secrets.AZURE_AI_FOUNDRY_PROJECT }}
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          REDTEAM_TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          python -m src.redteam.run_redteam --target-url "$REDTEAM_TARGET_URL"

      - name: Post red team summary
        if: always()
        run: |
          echo "## 🔴 AI Red Team Report" >> $GITHUB_STEP_SUMMARY
          if [ -f redteam_report.md ]; then
            cat redteam_report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No report generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload red team artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: redteam-report
          path: |
            redteam_report.json
            redteam_report.md
          retention-days: 90

      - name: Fail on critical findings
        run: |
          if [ -f redteam_report.json ]; then
            CRITICAL=$(python -c "import json; r=json.load(open('redteam_report.json')); print(r.get('has_critical_findings', False))")
            if [ "$CRITICAL" = "True" ]; then
              echo "❌ Critical red team findings detected — failing pipeline"
              exit 1
            fi
          fi
